<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="utf-8">
		<meta name="author" content="Gisele Fox">
		<meta name="description" content="a way for you to put all your canvas assignments into a notion page">
		<!-- Latest compiled and minified CSS -->
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
        <title>canvas2notion</title>
</head>
<body>
    <div class="container">
        <h1>canvas2notion</h1>
    
        <form class="form" onsubmit="return false">
            <div class="form-group">
                <label for="notionApiToken">Notion API Token</label>
                <input type="text" class="form-control" id="notionApiToken" placeholder="Another input">
            </div>
            <div class="form-group">
                <label for="canvasTokenInput">Canvas API Token</label>
                <input type="text" class="form-control" id="canvasTokenInput" placeholder="canvas token here">
            </div>
            <div class="form-group">
                <label for="notionDbId">Notion Database URL</label>
                <input type="text" class="form-control" id="notionDbId" placeholder="Another input">
            </div>
            <div class="form-group">
                <label for="canvasClassUrl">Canvas Class URL</label>
                <input type="text" class="form-control" id="canvasClassUrl" placeholder="Another input">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <!-- Link javascript file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.24.0/moment.min.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
